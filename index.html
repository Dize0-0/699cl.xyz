<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WWK | BIO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-image: url('https://i.pinimg.com/736x/58/ee/45/58ee459284f9e8e1aa0d4008bc5da42e.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0a0810;
            background-blend-mode: overlay;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* АВАТАРКА */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: url('https://i.pinimg.com/1200x/fa/47/b6/fa47b668212826f1ff0514ef211715b8.jpg') center/cover no-repeat;
            margin: 0 auto 16px;
            border: 2px solid rgba(255, 255, 255, 0.04);
        }

        .name {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
        }

        .handle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 14px;
        }

        .bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.15);
            margin-bottom: 22px;
            line-height: 1.5;
        }

        .bio .highlight {
            color: rgba(255, 255, 255, 0.25);
        }

        /* КНОПКИ */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 460px;
            margin: 0 auto;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.6);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transform: scale(1.01);
        }

        .btn .icon {
            font-size: 18px;
            opacity: 0.4;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.10);
        }

        .btn-partner {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 400;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.02);
            background: rgba(255, 255, 255, 0.01);
            color: rgba(255, 255, 255, 0.15);
            margin-top: 6px;
        }

        .btn-partner:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.02);
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .avatar { width: 80px; height: 80px; }
            .btn { font-size: 14px; padding: 12px 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- АВАТАРКА -->
    <div class="avatar"></div>

    <!-- ИМЯ -->
    <div class="name">WWK</div>
    <div class="handle">@your_support_user</div>

    <!-- БИО -->
    <div class="bio">
        <span class="highlight">Кто побеждал PRIME SINNERS?</span>
    </div>

    <!-- КНОПКИ-ССЫЛКИ -->
    <div class="links">
        <a href="https://discord.gg/s2nVtG9nQG" target="_blank" class="btn">
            <span class="icon">◈</span> Discord
        </a>
        <a href="https://t.me/your_support_user" target="_blank" class="btn">
            <span class="icon">◈</span> Telegram
        </a>
        <a href="https://www.youtube.com/@lo9d-1" target="_blank" class="btn">
            <span class="icon">◈</span> YouTube
        </a>
        <a href="https://www.tiktok.com/@slwpppp" target="_blank" class="btn">
            <span class="icon">◈</span> TikTok
        </a>
        <a href="https://discord.gg/FnujCaTXkr" target="_blank" class="btn btn-primary">
            <span class="icon">◈</span> Партнер: disappointed
        </a>
    </div>

    <div class="footer">WWK © 2026</div>
</div>

</body>
</html>
